<!DOCTYPE html>
<html>
<head>
    <title>Login | ImageTranslator </title>

    <style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(to right, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Login Card */
.login-box {
    background: white;
    padding: 40px;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

/* Heading */
.login-box h2 {
    margin-bottom: 20px;
    color: #333;
}

/* Input Fields */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body> 
<div class="login-box">
    <h2>🔐 Login</h2>

    <form onsubmit="loginUser(event)">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Image Translate Web App
    </div>
</div>

<script>
function loginUser(event) {
    event.preventDefault();

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "home.html";
    } else {
        alert("Invalid Login");
    }
}
</script>

</body>
</html>
